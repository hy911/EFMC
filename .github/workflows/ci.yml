# CI：PR 与 main 推送时跑 lint / 类型检查 / 迁移 / 构建 / 集成与 e2e 测试
# 起一个真实 Postgres service container，流程与生产构建一致（migrate → build）
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: payload
          POSTGRES_DB: efmc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payload -d efmc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://payload:payload@127.0.0.1:5432/efmc
      PAYLOAD_SECRET: ci-only-secret-not-for-production
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NEXT_TELEMETRY_DISABLED: 1

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: 类型检查
        run: pnpm exec tsc --noEmit

      - name: 数据库迁移
        run: pnpm payload migrate

      - name: 种子数据（e2e 依赖）
        run: pnpm seed

      - name: 生产构建（SSG 预渲染连库）
        run: pnpm build

      - name: 集成测试（vitest）
        run: pnpm test:int

      - name: 安装 Playwright 浏览器
        run: pnpm exec playwright install chromium --with-deps

      - name: e2e 测试（Playwright，webServer 自动起 dev）
        run: pnpm test:e2e

      - name: 上传 e2e 失败现场
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
